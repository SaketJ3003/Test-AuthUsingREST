<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md border border-gray-200 p-8">
        <h1 class="text-2xl font-semibold text-center text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-center text-gray-600 text-sm mb-8">Sign in to your account</p>
        
        <div id="errorMessage" class="hidden text-red-700 text-sm mb-4 p-3 bg-red-50 border border-red-200 rounded"></div>
        
        
        <div id="successMessage" class="hidden text-green-700 text-sm mb-4 p-3 bg-green-50 border border-green-200 rounded"></div>
        
        
        <form id="emailForm" class="mb-6">
            {% csrf_token %}
            <div class="mb-6">
                <label for="email" class="block text-gray-700 font-medium mb-2">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-300 transition"
                    autocomplete="off">
                <div id="emailStatus" class="text-sm mt-2"></div>
            </div>
        </form>
        
        <form id="passwordForm" class="hidden">
            {% csrf_token %}
            <input type="hidden" id="hiddenEmail" name="email">
            
            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-300 transition"
                    autocomplete="off">
                <div id="passwordError" class="text-red-700 text-sm mt-2 hidden"></div>
            </div>
            
            <button type="button" id="loginBtn" onclick="submitLogin()" class="w-full px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-2xl transition shadow-sm">
                Login
            </button>
            
            <button type="button" onclick="resetForm()" class="w-full px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white font-medium rounded-2xl transition mt-3 shadow-sm">
                Back
            </button>
        </form>
        
        <div id="createProfileSection" class="hidden">
            <p class="text-gray-700 text-sm mb-4">This email is not registered yet. We'll send you a registration link via email.</p>
            <button type="button" onclick="sendRegistrationEmail()" class="w-full px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-2xl transition shadow-sm">
                Send Registration Link
            </button>
            <button type="button" onclick="resetForm()" class="w-full px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white font-medium rounded-2xl transition mt-3 shadow-sm">
                Back
            </button>
        </div>
        
        <div id="loadingSpinner" class="hidden text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-600"></div>
            <p class="text-gray-600 text-sm mt-2">Checking email...</p>
        </div>
    </div>

    <script>
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        let emailCheckTimeout;

        document.getElementById('email').addEventListener('input', function() {
            clearTimeout(emailCheckTimeout);
            const email = this.value.trim();
            const emailStatus = document.getElementById('emailStatus');
            
            document.getElementById('passwordForm').classList.add('hidden');
            document.getElementById('createProfileSection').classList.add('hidden');
            document.getElementById('loadingSpinner').classList.add('hidden');
            emailStatus.innerHTML = '';
            
            if (!email) {
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailStatus.innerHTML = '<span class="text-amber-700 text-sm">Please enter a valid email address</span>';
                return;
            }
            
            emailCheckTimeout = setTimeout(() => {
                checkEmailExists(email);
            }, 500);
        });

        function checkEmailExists(email) {
            const loadingSpinner = document.getElementById('loadingSpinner');
            const emailStatus = document.getElementById('emailStatus');
            
            loadingSpinner.classList.remove('hidden');
            emailStatus.innerHTML = '';
            
            fetch('/api/email-check/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                loadingSpinner.classList.add('hidden');
                
                if (data.exists) {
                    emailStatus.innerHTML = '<span class="text-green-700 text-sm">✓ Email found! Enter your password.</span>';
                    document.getElementById('passwordForm').classList.remove('hidden');
                    document.getElementById('createProfileSection').classList.add('hidden');
                    document.getElementById('hiddenEmail').value = email;
                    document.getElementById('password').focus();
                } else {
                    emailStatus.innerHTML = '<span class="text-blue-700 text-sm">New email detected. Click below to create profile.</span>';
                    document.getElementById('passwordForm').classList.add('hidden');
                    document.getElementById('createProfileSection').classList.remove('hidden');

                    window.registrationEmail = email;
                }
            })
            .catch(error => {
                loadingSpinner.classList.add('hidden');
                emailStatus.innerHTML = '<span class="text-red-700 text-sm">Error checking email. Please try again.</span>';
                console.error('Error:', error);
            });
        }

        function sendRegistrationEmail() {
            const email = window.registrationEmail;
            if (!email) {
                document.getElementById('errorMessage').textContent = 'Email not found. Please try again.';
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }
            
            const loadingSpinner = document.getElementById('loadingSpinner');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            loadingSpinner.innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-600"></div><p class="text-gray-600 text-sm mt-2">Sending registration email...</p>';
            loadingSpinner.classList.remove('hidden');
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');
            
            console.log('Sending registration email to:', email);
            
            fetch('/api/send-registration-email/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                loadingSpinner.classList.add('hidden');
                loadingSpinner.innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-600"></div><p class="text-gray-600 text-sm mt-2">Checking email...</p>';
                
                if (data.success) {
                    successMessage.textContent = data.message;
                    successMessage.classList.remove('hidden');
                    setTimeout(() => {
                        successMessage.classList.add('hidden');
                        resetForm();
                    }, 5000);
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.classList.remove('hidden');
                }
            })
            .catch(error => {
                console.error('Full error:', error);
                loadingSpinner.classList.add('hidden');
                loadingSpinner.innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-600"></div><p class="text-gray-600 text-sm mt-2">Checking email...</p>';
                errorMessage.textContent = 'Error sending email. Error: ' + error.message;
                errorMessage.classList.remove('hidden');
            });
        }

        function resetForm() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('emailStatus').innerHTML = '';
            document.getElementById('passwordError').innerHTML = '';
            document.getElementById('passwordForm').classList.add('hidden');
            document.getElementById('createProfileSection').classList.add('hidden');
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('email').focus();
        }

        const passwordInput = document.getElementById('password');
        let passwordCheckTimeout;
        
        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                clearTimeout(passwordCheckTimeout);
                const password = this.value;
                const errorDiv = document.getElementById('passwordError');
                const loginBtn = document.getElementById('loginBtn');
                
                if (password.length === 0) {
                    errorDiv.classList.add('hidden');
                    errorDiv.innerHTML = '';
                    this.classList.remove('border-red-500', 'border-green-500');
                    loginBtn.disabled = true;
                    loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    return;
                }
                
                const formatErrors = validatePasswordFormat(password);
                
                if (formatErrors.length > 0) {

                    errorDiv.textContent = 'Must have: ' + formatErrors.join(', ');
                    errorDiv.classList.remove('hidden');
                    this.classList.add('border-red-500');
                    this.classList.remove('border-green-500');
                    loginBtn.disabled = true;
                    loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {

                    passwordCheckTimeout = setTimeout(() => {
                        validatePasswordCorrectness(password);
                    }, 500);
                }
            });
        }


        const passwordValidationRules = {
            name: 'Password',
            required: true,
            minLength: 8,
            hasUppercase: true,
            hasLowercase: true,
            hasNumber: true,
            hasSpecialChar: true,
            specialChars: '%@-_'
        };

        function validatePasswordFormat(password) {
            const errors = [];
            
            if (!password) return errors;
            
            if (password.length < passwordValidationRules.minLength) {
                errors.push('8+ characters');
            }

            if (passwordValidationRules.hasUppercase && !/[A-Z]/.test(password)) {
                errors.push('1 capital letter');
            }

            if (passwordValidationRules.hasLowercase && !/[a-z]/.test(password)) {
                errors.push('1 lowercase letter');
            }

            if (passwordValidationRules.hasNumber && !/\d/.test(password)) {
                errors.push('1 number');
            }

            if (passwordValidationRules.hasSpecialChar && !/[%@\-_]/.test(password)) {
                errors.push(`1 special character (${passwordValidationRules.specialChars})`);
            }
            
            return errors;
        }

        function validatePasswordCorrectness(password) {
            const errorDiv = document.getElementById('passwordError');
            const loginBtn = document.getElementById('loginBtn');
            const email = document.getElementById('hiddenEmail').value;
            const loadingSpinner = document.getElementById('loadingSpinner');
            
            loadingSpinner.innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-600"></div><p class="text-gray-600 text-sm mt-2">Validating password...</p>';
            loadingSpinner.classList.remove('hidden');
            
            errorDiv.classList.add('hidden');
            passwordInput.classList.remove('border-red-500', 'border-green-500');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            fetch('/api/password-validate/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ 
                    email: email,
                    password: password 
                })
            })
            .then(response => response.json())
            .then(data => {
                loadingSpinner.classList.add('hidden');
                
                if (data.valid) {

                    errorDiv.textContent = '✓ Password is correct';
                    errorDiv.classList.remove('hidden');
                    errorDiv.className = 'text-green-700 text-sm mt-2';
                    passwordInput.classList.remove('border-red-500');
                    passwordInput.classList.add('border-green-500');
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {

                    errorDiv.textContent = '✗ Password is incorrect';
                    errorDiv.classList.remove('hidden');
                    errorDiv.className = 'text-red-700 text-sm mt-2';
                    passwordInput.classList.add('border-red-500');
                    passwordInput.classList.remove('border-green-500');
                    loginBtn.disabled = true;
                    loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            })
            .catch(error => {
                loadingSpinner.classList.add('hidden');
                console.error('Error validating password:', error);
                errorDiv.textContent = 'Error checking password';
                errorDiv.classList.remove('hidden');
                errorDiv.className = 'text-red-700 text-sm mt-2';
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
            });
        }

        function submitLogin() {
            const email = document.getElementById('hiddenEmail').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('passwordError');
            const loadingSpinner = document.getElementById('loadingSpinner');

            if (!email || !password) {
                errorDiv.textContent = 'Email and password are required';
                errorDiv.classList.remove('hidden');
                return;
            }

            loadingSpinner.innerHTML = '<div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-600"></div><p class="text-gray-600 text-sm mt-2">Logging in...</p>';
            loadingSpinner.classList.remove('hidden');
            errorDiv.classList.add('hidden');

            fetch('/api/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(response => {
                console.log('Login response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Login response data:', data);
                loadingSpinner.classList.add('hidden');

                if (data.tokens && data.tokens.access_token) {
                    console.log('Tokens received, storing in localStorage...');

                    localStorage.setItem('access_token', data.tokens.access_token);
                    localStorage.setItem('refresh_token', data.tokens.refresh_token);
                    localStorage.setItem('user_id', data.tokens.user_id);
                    localStorage.setItem('email', data.tokens.email);


                    const storedToken = localStorage.getItem('access_token');
                    if (storedToken) {
                        console.log('Tokens verified in localStorage, redirecting to profile...');

                        setTimeout(() => {
                            console.log('Navigating to /profile/');
                            window.location.href = '/profile/';
                        }, 500);
                    } else {
                        errorDiv.textContent = 'Failed to store session. Please try again.';
                        errorDiv.classList.remove('hidden');
                    }
                } else {
                    errorDiv.textContent = data.message || 'Login failed';
                    errorDiv.classList.remove('hidden');
                }
            })
            .catch(error => {
                loadingSpinner.classList.add('hidden');
                console.error('Error logging in:', error);
                errorDiv.textContent = 'Error logging in: ' + error.message;
                errorDiv.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
