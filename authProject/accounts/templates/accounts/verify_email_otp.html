<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Verify Email OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-md border border-gray-200 p-8">
        <h1 class="text-2xl font-semibold text-center text-gray-900 mb-2">Verify Email</h1>
        <p class="text-center text-gray-600 text-sm mb-6">We've sent an OTP to <strong>{{ email }}</strong>. Please enter it below.</p>
        
        <div id="errorMessage" class="hidden text-red-700 text-sm mb-4 p-4 bg-red-50 border-2 border-red-300 rounded-2xl font-medium"></div>

        <div id="successMessage" class="hidden text-green-700 text-sm mb-4 p-4 bg-green-50 border-2 border-green-300 rounded-2xl font-medium"></div>
        
        <form id="otpForm" class="mb-6">
            <div class="mb-6">
                <label for="otp" class="block text-gray-700 font-medium mb-2">Enter OTP</label>
                <input type="text" id="otp" name="otp" required placeholder="000000" maxlength="6"
                    class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-300 transition text-center text-2xl letter-spacing-widest"
                    inputmode="numeric">
            </div>
            
            <div id="timerContainer" class="mb-6 text-center">
                <div class="inline-block px-4 py-2 bg-red-100 border border-red-300 rounded-2xl">
                    <span id="timer" class="text-red-700 font-semibold text-lg">02:00</span>
                </div>
            </div>
            
            <button type="submit" class="w-full px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-2xl transition shadow-sm">
                Verify OTP
            </button>
        </form>
        
        <div id="resendContainer" class="hidden text-center">
            <button type="button" id="resendBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-2xl transition">
                Resend New OTP
            </button>
        </div>
        
        <div id="loadingSpinner" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-8 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                <p class="text-gray-600 text-sm mt-4">Verifying OTP...</p>
            </div>
        </div>
    </div>

    <script>
        const email = '{{ email }}';
        let expiresAt = '{{ otp_expires_at }}';
        const csrftoken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        let timerIntervalId = null;  
        
        function parseISODate(dateString) {
            if (!dateString) {
                console.error('❌ parseISODate: Empty date string provided');
                return new Date(NaN);
            }
            const date = new Date(dateString);
            if (isNaN(date.getTime())) {
                console.error('❌ parseISODate: Invalid date string:', dateString);
                return new Date(NaN);
            }
            return date;
        }
        
        function startTimer() {
        
            if (timerIntervalId) {
                clearInterval(timerIntervalId);
                timerIntervalId = null;
            }

            const timerElement = document.getElementById('timer');
            const timerContainer = document.getElementById('timerContainer');
            const resendContainer = document.getElementById('resendContainer');
            const otpForm = document.getElementById('otpForm');

            const expiryString = window.expiresAt || expiresAt;
            console.log('startTimer: Using expiry string:', expiryString);

            const expirationTime = parseISODate(expiryString).getTime();

            if (isNaN(expirationTime)) {
                console.error('❌ Failed to parse expiration time, cannot start timer');
                timerElement.textContent = '';
                timerContainer.classList.remove('hidden');
                otpForm.classList.add('hidden');
                resendContainer.classList.remove('hidden');
                return;
            }

            
            const initialTimeLeft = expirationTime - new Date().getTime();

            console.log('OTP Expiration Check:');
            console.log('Expiration time:', new Date(expirationTime));
            console.log('Current time:', new Date());
            console.log('Time left (ms):', initialTimeLeft);
            console.log('Time left (seconds):', Math.floor(initialTimeLeft / 1000));

            if (initialTimeLeft <= 0) {

                console.warn('⏰ OTP already expired on page load');
                timerElement.textContent = '00:00';
                timerContainer.classList.add('hidden');
                otpForm.classList.add('hidden');
                resendContainer.classList.remove('hidden');
                return;
            }

            console.log('✓ OTP is valid, showing form and starting timer');
            otpForm.classList.remove('hidden');
            timerContainer.classList.remove('hidden');
            resendContainer.classList.add('hidden');
            otpForm.style.display = 'block';  

            timerIntervalId = setInterval(() => {
                const now = new Date().getTime();
                const timeLeft = expirationTime - now;

                if (timeLeft <= 0) {
                    clearInterval(timerIntervalId);
                    timerIntervalId = null;
                    timerElement.textContent = '00:00';
                    timerContainer.classList.add('hidden');
                    otpForm.classList.add('hidden');
                    resendContainer.classList.remove('hidden');
                    return;
                }

                const minutes = Math.floor(timeLeft / 60000);
                const seconds = Math.floor((timeLeft % 60000) / 1000);
                timerElement.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                if (timeLeft < 60000) {
                    timerElement.parentElement.parentElement.classList.add('bg-yellow-100', 'border-yellow-300');
                    timerElement.parentElement.parentElement.classList.remove('bg-red-100', 'border-red-300');
                    timerElement.classList.add('text-yellow-700');
                    timerElement.classList.remove('text-red-700');
                }
            }, 1000);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            startTimer();
            
            document.getElementById('otpForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const otp = document.getElementById('otp').value.trim();
                const errorMessage = document.getElementById('errorMessage');
                const successMessage = document.getElementById('successMessage');
                const loadingSpinner = document.getElementById('loadingSpinner');
                
                if (!otp || otp.length !== 6) {
                    errorMessage.textContent = 'Please enter a valid 6-digit OTP';
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
                loadingSpinner.classList.remove('hidden');
                errorMessage.classList.add('hidden');
                successMessage.classList.add('hidden');
                
                fetch('/api/registration/verify_registration_otp/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify({
                        email: email,
                        otp: otp
                    })
                })
                .then(response => response.json())
                .then(data => {
                    loadingSpinner.classList.add('hidden');

                    if (data.success) {
                        console.log('OTP verification successful');
                        successMessage.textContent = data.message;
                        successMessage.classList.remove('hidden');
                        document.getElementById('otpForm').classList.add('hidden');
                        document.getElementById('timerContainer').classList.add('hidden');

                        if (data.tokens && data.tokens.access_token) {
                            localStorage.setItem('access_token', data.tokens.access_token);
                            localStorage.setItem('refresh_token', data.tokens.refresh_token);
                            localStorage.setItem('user_id', data.tokens.user_id);
                            localStorage.setItem('email', data.tokens.email);
                            console.log('Tokens stored successfully');
                        } else {
                            console.warn('No tokens in response:', data);
                        }

                        setTimeout(() => {
                            window.location.href = '/profile/';
                        }, 1500);
                    } else {
                        console.error('OTP verification failed:', data.message);
                        errorMessage.textContent = '❌ ' + (data.message || 'OTP verification failed');
                        errorMessage.classList.remove('hidden');

                        document.getElementById('otp').value = '';
                        document.getElementById('otp').focus();
                    }
                })
                .catch(error => {
                    loadingSpinner.classList.add('hidden');
                    console.error('Error verifying OTP:', error);
                    errorMessage.textContent = '❌ Error verifying OTP. Please try again.';
                    errorMessage.classList.remove('hidden');
                    document.getElementById('otp').value = '';
                    document.getElementById('otp').focus();
                });
            });

            document.getElementById('resendBtn').addEventListener('click', function() {
                const resendBtn = this;
                resendBtn.disabled = true;
                resendBtn.textContent = 'Sending...';

                fetch('/api/registration/resend_registration_otp/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify({
                        email: email
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        console.log('✓ New OTP received');
                        console.log('API Response:', data);
                        console.log('otp_expires_at value:', data.otp_expires_at);
                        alert('✓ New OTP has been sent to ' + email);

                        window.expiresAt = data.otp_expires_at;
                        console.log('Updated window.expiresAt to:', window.expiresAt);

                        document.getElementById('resendContainer').classList.add('hidden');
                        document.getElementById('otpForm').classList.remove('hidden');
                        document.getElementById('otpForm').style.display = 'block';
                        document.getElementById('timerContainer').classList.remove('hidden');

                        console.log('Calling startTimer()...');
                        startTimer();

                        document.getElementById('otp').value = '';
                        document.getElementById('otp').focus();

                        resendBtn.disabled = false;
                        resendBtn.textContent = 'Resend New OTP';
                    } else {
                        console.error('Resend failed:', data.message);
                        alert('❌ Error: ' + (data.message || 'Could not resend OTP'));
                        resendBtn.disabled = false;
                        resendBtn.textContent = 'Resend New OTP';
                    }
                })
                .catch(error => {
                    console.error('Error resending OTP:', error);
                    alert('❌ Error resending OTP: ' + error.message);
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend New OTP';
                });
            });
        });
    </script>
</body>
</html>
